name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Lint
        run: npm run lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan commits, not just HEAD.
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Gitleaks secret scan
        run: |
          set -eux
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --verbose --redact

      - name: Semgrep scan
        if: github.event_name == 'pull_request'
        run: |
          set -eux
          python3 -m pip install --quiet semgrep
          # Use a publicly-available ruleset (no SEMGREP_APP_TOKEN required).
          # p/ci is the standard CI pack curated by semgrep.dev.
          semgrep scan --config=p/ci --error --no-git-ignore .
